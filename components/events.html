<!-- Events -->
<section class="events-section" id="events">
  <div class="container">
    <div class="section-header">
      <span class="section-label">On The Water</span>
      <h2 class="section-title">Regatta Calendar</h2>
      <p class="section-subtitle">The full ECRC schedule. All events hosted by member clubs along the East Coast of Ireland.</p>
    </div>

    <!-- Year tabs — rendered by JS -->
    <div class="res-year-tabs" id="cal-year-tabs"></div>

    <div id="cal-render"></div>
  </div>
</section>

<script>
(function renderCalendar() {
  const DEFAULT_EVENTS = [
    { id: 'e1', type: 'ecrc_race', date: '2026-05-16', club: "St. Michael's RC", logo: 'Clubs Logo/SMRC.jpg', location: '', map: '#' },
    { id: 'e2', type: 'ecrc_race', date: '2026-05-29', club: 'Dalkey RC',         logo: 'Clubs Logo/Dalkey RC.jpg', location: '', map: '#' },
    { id: 'e3', type: 'ecrc_race', date: '2026-06-06', club: 'Skerries RC',        logo: 'Clubs Logo/Skerries RC.png', location: '', map: '#' },
    { id: 'e4', type: 'ecrc_race', date: '2026-06-20', club: 'Stella Maris RC',    logo: 'Clubs Logo/Stella Maris RC.jpg', location: '', map: '#' },
    { id: 'e5', type: 'ecrc_race', date: '2026-06-26', club: 'Bray RC',            logo: 'Clubs Logo/Bray RC.jpg', location: '', map: '#' },
    { id: 'e6', type: 'ecrc_race', date: '2026-07-04', club: 'St. Patricks RC',    logo: 'Clubs Logo/St Pats RC.jpg', location: '', map: '#' },
    { id: 'e7', type: 'ecrc_race', date: '2026-07-18', club: 'Fingal RC',          logo: 'Clubs Logo/Fingal RC.jpg', location: '', map: '#' },
    { id: 'e8', type: 'ecrc_race', date: '2026-07-25', club: 'Greystones RC',      logo: 'Clubs Logo/Greystones Tc.jpg', location: '', map: '#' },
    { id: 'e9', type: 'ecrc_race', date: '2026-08-01', club: 'Wicklow RC',         logo: 'Clubs Logo/Wicklow RC.jpg', location: '', map: '#' },
  ];

  let allEvents;
  try { allEvents = JSON.parse(localStorage.getItem('ecrc_admin_events') || 'null') || DEFAULT_EVENTS; }
  catch { allEvents = DEFAULT_EVENTS; }

  const TYPE_BADGE = {
    ecrc_race: { label: 'ECRC Race',     bg: 'rgba(13,34,68,0.09)',    color: '#0d2244' },
    charity:   { label: 'Charity Event', bg: 'rgba(22,163,74,0.12)',   color: '#15803d' },
    other:     { label: 'Other',         bg: 'rgba(100,116,139,0.12)', color: '#475569' },
  };
  const mapIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`;

  // Build sorted list of unique years (newest first)
  const currentYear = new Date().getFullYear();
  const yearsSet = new Set(allEvents.map(e => new Date(e.date).getFullYear()));
  if (!yearsSet.size) yearsSet.add(currentYear);
  const years = Array.from(yearsSet).sort((a, b) => b - a);

  // Render year tabs
  const tabsEl = document.getElementById('cal-year-tabs');
  tabsEl.innerHTML = years.map((y, i) =>
    `<button class="res-year-btn${i === 0 ? ' active' : ''}" data-year="${y}" onclick="switchCalYear(${y}, this)">${y}</button>`
  ).join('');

  function renderYear(year) {
    const today = new Date(); today.setHours(0,0,0,0);
    const isCurrentYear = year === currentYear;

    let events = allEvents.filter(e => new Date(e.date).getFullYear() === year);
    // Only hide past events for the current year
    if (isCurrentYear) {
      events = events.filter(e => new Date(e.endDate || e.date) >= today);
    }

    if (!events.length) {
      document.getElementById('cal-render').innerHTML =
        `<p style="color:var(--muted);text-align:center;padding:40px 0;">No events scheduled for ${year}.</p>`;
      return;
    }

    // Group by month
    const months = {};
    events.forEach(e => {
      const d = new Date(e.date);
      const key = d.getFullYear() + '-' + String(d.getMonth()).padStart(2,'0');
      if (!months[key]) months[key] = { label: d.toLocaleDateString('en-IE', { month: 'long' }), year: d.getFullYear(), events: [] };
      months[key].events.push(e);
    });

    const html = Object.values(months).map(m => {
      const cards = m.events.map(e => {
        const d   = new Date(e.date);
        const day = e.endDate ? `${d.getDate()}–${new Date(e.endDate).getDate()}` : d.getDate();
        const mon = d.toLocaleDateString('en-IE', { month: 'short' }).toUpperCase();
        const badge = TYPE_BADGE[e.type] || TYPE_BADGE.other;
        const isFeatured = e.type !== 'ecrc_race';
        return `<div class="cal-card${isFeatured ? ' cal-card-charity' : ''}">
          ${isFeatured ? `<div class="cal-featured-badge" style="background:${badge.bg};color:${badge.color};">${badge.label}</div>` : ''}
          <div class="cal-date-badge${e.endDate ? ' cal-date-multi' : ''}">
            <span class="cal-day">${day}</span>
            <span class="cal-mon">${mon}</span>
          </div>
          <div class="cal-logo"><img src="${e.logo}" alt="${e.club}" /></div>
          <div class="cal-details">
            <h4>${e.club}</h4>
            <span class="cal-label">${badge.label}</span>
          </div>
          <a href="${e.map || '#'}" class="cal-map-btn" target="_blank" rel="noopener" title="Get Directions">
            ${mapIcon} Get Directions
          </a>
        </div>`;
      }).join('');

      return `<div class="cal-month">
        <div class="cal-month-header">
          <span class="cal-month-name">${m.label}</span>
          <span class="cal-month-year">${m.year}</span>
          <span class="cal-month-count">${m.events.length} event${m.events.length !== 1 ? 's' : ''}</span>
        </div>
        <div class="cal-grid">${cards}</div>
      </div>`;
    }).join('');

    document.getElementById('cal-render').innerHTML = html;
  }

  window.switchCalYear = function(year, btn) {
    document.querySelectorAll('#cal-year-tabs .res-year-btn').forEach(b => b.classList.toggle('active', b === btn));
    renderYear(year);
  };

  // Default: show the most recent year (index 0)
  renderYear(years[0]);
})();
</script>
