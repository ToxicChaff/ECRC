<!-- News & Updates -->
<section class="news-section" id="news">
  <div class="container">

    <div class="section-header">
      <span class="section-label">Stay Connected</span>
      <h2 class="section-title">News &amp; Updates</h2>
      <p class="section-subtitle">Announcements and updates from the ECRC. Follow us on social media for photos and live coverage.</p>
    </div>

    <!-- Follow Us cards -->
    <div class="follow-cards">
      <a href="https://www.facebook.com/EastCoastRowingCouncil" class="follow-card follow-card-fb" target="_blank" rel="noopener">
        <div class="follow-card-icon">f</div>
        <div class="follow-card-info">
          <h4>East Coast Rowing Council</h4>
          <span>facebook.com/EastCoastRowingCouncil</span>
        </div>
        <span class="follow-card-btn">Follow &#8594;</span>
      </a>
      <a href="https://www.instagram.com/east.coastrowing/" class="follow-card follow-card-ig" target="_blank" rel="noopener">
        <div class="follow-card-icon">&#128247;</div>
        <div class="follow-card-info">
          <h4>@east.coastrowing</h4>
          <span>instagram.com/east.coastrowing</span>
        </div>
        <span class="follow-card-btn">Follow &#8594;</span>
      </a>
    </div>

    <!-- News feed -->
    <div class="news-feed-header">
      <h3 class="news-feed-title">Latest Announcements</h3>
    </div>
    <div class="news-feed" id="news-feed"></div>

  </div>
</section>

<script>
(function() {
  const feed = document.getElementById('news-feed');
  let posts;
  try { posts = JSON.parse(localStorage.getItem('ecrc_admin_news') || '[]'); } catch { posts = []; }

  if (!posts.length) {
    feed.innerHTML = '<p class="news-empty">No announcements posted yet. Check back soon.</p>';
    return;
  }

  feed.innerHTML = posts.map(n => {
    const d = new Date(n.date);
    const dateStr = isNaN(d) ? n.date : d.toLocaleDateString('en-IE', { day: 'numeric', month: 'long', year: 'numeric' });

    // Convert YouTube/Vimeo URL to embed URL
    let videoEmbed = '';
    if (n.videoUrl) {
      let embedSrc = '';
      const ytMatch = n.videoUrl.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&?/]+)/);
      const vmMatch = n.videoUrl.match(/vimeo\.com\/(\d+)/);
      if (ytMatch) embedSrc = `https://www.youtube.com/embed/${ytMatch[1]}`;
      else if (vmMatch) embedSrc = `https://player.vimeo.com/video/${vmMatch[1]}`;
      if (embedSrc) videoEmbed = `<div style="position:relative;padding-top:56.25%;margin-bottom:2px;border-radius:8px;overflow:hidden;">
        <iframe src="${embedSrc}" style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;" allowfullscreen loading="lazy"></iframe>
      </div>`;
    }

    return `<article class="news-card">
      ${n.imageData ? `<img src="${n.imageData}" alt="${n.title}" style="width:100%;height:180px;object-fit:cover;border-radius:8px;margin-bottom:4px;" />` : ''}
      ${videoEmbed}
      <span class="news-card-date">${dateStr}</span>
      <h3 class="news-card-title">${n.title}</h3>
      ${n.body ? `<p class="news-card-body">${n.body.replace(/\n/g, '<br>')}</p>` : ''}
      ${n.link ? `<a href="${n.link}" class="news-card-link" target="_blank" rel="noopener">Read more &#8594;</a>` : ''}
    </article>`;
  }).join('');
})();
</script>
